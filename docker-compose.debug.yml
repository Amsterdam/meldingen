services:
  meldingen:
    ports:
      - "5678:5678"
    environment:
      # Allows the existing entrypoint to run migrations/seed even though we start via `sh -c ...`.
      MELDINGEN_RUN_INIT: "1"
    # Installs debugpy only inside the running dev container (not a project dependency).
    # The image runs as the non-root `meldingen` user, so install into a writable user base.
    command:
      [
        "sh",
        "-c",
        "export HOME=/tmp PYTHONUSERBASE=/tmp/pyuserbase; python -m pip install -q --no-cache-dir --user debugpy && exec python -Xfrozen_modules=off -m debugpy --listen 0.0.0.0:5678 --wait-for-client --configure-subProcess True -m uvicorn meldingen.main:app --host 0.0.0.0 --port 8000 --reload --reload-dir /opt/meldingen"
      ]
